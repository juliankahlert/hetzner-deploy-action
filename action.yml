name: 'Hetzner Deploy Action'
description: 'Create or update a Hetzner Cloud server and deploy a directory to it.'
author: 'Julian Kahlert'
inputs:
  hcloud_token:
    description: 'Hetzner API token (store as secret)'
    required: true
  # Pattern: ^[a-zA-Z0-9][a-zA-Z0-9._-]{0,62}$
  server_name:
    description: 'Logical server name to find or create'
    required: true
  # Pattern: ^[a-zA-Z0-9][a-zA-Z0-9._-]{0,254}$
  project_tag:
    description: 'Tag used to identify servers shared across repos'
    required: true
  # Pattern: ^[a-zA-Z][a-zA-Z0-9._-]{0,63}$
  image:
    description: 'Hetzner image slug (default: ubuntu-24.04)'
    required: false
    default: 'ubuntu-24.04'
  # Pattern: ^[a-z]{2,4}[0-9]{1,3}(-[a-z0-9]+)?$
  server_type:
    description: 'Hetzner server type (default: cx23)'
    required: false
    default: 'cx23'
  # Pattern: ^(true|false)$
  ipv6_only:
    description: 'If true, provision with IPv6 only (no public IPv4)'
    required: false
    default: 'false'
  public_key:
    description: 'SSH public key to register on the server'
    required: true
  ssh_private_key:
    description: 'SSH private key for rsync (store as secret)'
    required: true
  # Pattern: ^[a-zA-Z_][a-zA-Z0-9_-]{0,31}$
  ssh_user:
    description: 'SSH user for connecting to the server'
    required: false
    default: 'root'
  # Pattern: ^[a-zA-Z0-9][a-zA-Z0-9._@-]{0,255}$ (optional)
  service_name:
    description: 'Systemd service name to restart after deploy'
    required: false
  # Pattern: relative or absolute path without ".." sequences
  source_dir:
    description: 'Directory in the workspace to deploy'
    required: false
    default: '.'
  # Pattern: absolute path (starts with /) without ".." sequences
  target_dir:
    description: 'Target directory on the VPS where files will be placed'
    required: false
    default: '/opt/app'
  # Pattern: ^[a-zA-Z0-9][a-zA-Z0-9._\/:@-]*$ (optional)
  container_image:
    description: 'Container image reference — enables the podman stage when set'
    required: false
  # Pattern: relative or absolute path without ".." sequences (optional)
  haproxy_cfg:
    description: 'Path to HAProxy config — enables the haproxy stage when set'
    required: false
  # Pattern: ^(true|false)$ (optional)
  firewall_enabled:
    description: 'If true, enable the firewall stage'
    required: false
    default: 'false'
outputs:
  server_ip:
    description: 'Public IP address of the server (IPv4 by default; IPv6 when ipv6_only is true)'
  server_id:
    description: 'Hetzner server ID'
  server_status:
    description: 'Server status after provisioning'

runs:
  using: 'node20'
  main: 'dist/index.js'
